<style>
:root{
  --bg:#0d1117;
  --surface:#161c26;
  --surface2:#1e2736;
  --border:#2a3545;
  --accent:#CC1B1B;
  --accent2:#a81414;
  --accent-light:rgba(204,27,27,0.12);
  --text:#e8edf4;
  --text2:#7a8fa8;
  --green:#2dbd6e;
  --red:#f04040;
  --blue:#4a90d9;
  --purple:#9b6fd4;
  --nav-h:62px;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overflow-x:hidden;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top) 16px 0;height:calc(54px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.header-logo{height:24px;width:auto;object-fit:contain;display:block;flex-shrink:0;}
.header-divider{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.header-title{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.btn-manage{background:var(--accent-light);border:1px solid rgba(204,27,27,0.4);color:var(--accent);border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.master-badge{background:rgba(155,111,212,0.15);border:1px solid rgba(155,111,212,0.4);color:var(--purple);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;display:none;white-space:nowrap;}
.btn-logout{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:none;white-space:nowrap;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text2);transition:color 0.2s;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;font-weight:500;}

/* SCREENS */
.screen{display:none;padding:20px 16px calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));}
.screen.active{display:block;}
.screen-title{font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px;}
.screen-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}

/* FILTERS */
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
.filter-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;}
.filter-box.full{grid-column:1/-1;}
.filter-label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;}
.filter-select,.filter-input{width:100%;background:transparent;border:none;color:var(--text);padding:0;font-size:14px;font-family:'Noto Sans KR',sans-serif;appearance:none;-webkit-appearance:none;outline:none;}
.filter-select option{background:var(--surface2);color:var(--text);}
.sw{position:relative;}
.sw::after{content:'▾';position:absolute;right:0;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:11px;}
.filter-input::placeholder{color:var(--text2);}
.btn-search{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;letter-spacing:0.2px;}
.btn-search:active{background:var(--accent2);}

/* RESULTS */
.results-header{display:flex;justify-content:space-between;align-items:center;margin:18px 0 11px;}
.results-count{font-size:13px;color:var(--text2);}
.results-count span{color:var(--accent);font-weight:700;}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s;}
.result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.result-card:active{transform:scale(0.98);}
.card-model{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--accent);margin-bottom:5px;}
.card-parttype{font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-0.2px;}
.card-name{font-size:15px;font-weight:600;margin-bottom:6px;}
.card-specs{font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-specs b{color:var(--text);font-weight:600;margin-right:4px;}
.card-submeta{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text2);margin-bottom:9px;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.tag.hl{background:var(--accent-light);border-color:rgba(204,27,27,0.35);color:var(--accent);}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;}
.empty-state .icon{font-size:46px;margin-bottom:12px;}
.empty-state p{font-size:14px;color:var(--text2);line-height:1.6;}

/* UNIT */
.group-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none;}
.group-chips::-webkit-scrollbar{display:none;}
.group-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);border:1px solid var(--border);color:var(--text2);white-space:nowrap;transition:all 0.2s;}
.group-chip.active{background:var(--accent-light);border-color:rgba(204,27,27,0.5);color:var(--accent);}
.equip-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:13px;scrollbar-width:none;}
.equip-chips::-webkit-scrollbar{display:none;}
.equip-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text2);white-space:nowrap;transition:all 0.2s;}
.equip-chip.active{background:var(--accent-light);border-color:rgba(204,27,27,0.4);color:var(--accent);}
.unit-img-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:13px;}
.unit-img-wrapper{position:relative;width:100%;}
.unit-img-wrapper img,.unit-img-wrapper svg{width:100%;height:auto;display:block;}
.hotspot{position:absolute;width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transform:translate(-50%,-50%);animation:pulse 2s infinite;z-index:10;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(204,27,27,0.25);}50%{box-shadow:0 0 0 9px rgba(204,27,27,0.08);}}
.unit-tip{text-align:center;font-size:12px;color:var(--text2);padding:9px;background:rgba(0,0,0,0.2);border-top:1px solid var(--border);}
.parts-list{display:flex;flex-direction:column;gap:8px;}
.part-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color 0.2s;}
.part-row:active{transform:scale(0.98);}
.part-num{width:26px;height:26px;background:var(--accent-light);border:1px solid rgba(204,27,27,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;}
.part-info{flex:1;}
.part-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.part-model{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);}

/* ADMIN */
.admin-locked-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;margin-top:8px;}
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:13px;display:flex;align-items:center;gap:7px;}
.lock-badge{font-size:10px;background:rgba(155,111,212,0.15);color:var(--purple);border:1px solid rgba(155,111,212,0.3);border-radius:4px;padding:2px 6px;}
.form-row{margin-bottom:10px;}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;}
.form-input:focus{outline:none;border-color:var(--accent);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.upload-box{border:2px dashed var(--border);border-radius:var(--radius);padding:22px 14px;text-align:center;cursor:pointer;background:var(--surface2);position:relative;transition:border-color 0.2s;}
.upload-box:hover{border-color:var(--accent);}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:26px;margin-bottom:7px;}
.upload-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.upload-sub{font-size:11px;color:var(--text2);}
.upload-status{margin-top:9px;font-size:12px;padding:8px 12px;border-radius:8px;display:none;}
.upload-status.ok{background:rgba(45,189,110,0.1);border:1px solid rgba(45,189,110,0.3);color:var(--green);display:block;}
.upload-status.err{background:rgba(240,64,64,0.1);border:1px solid rgba(240,64,64,0.3);color:var(--red);display:block;}
.xlsx-tpl{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:11px;}
.col-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.col-chip{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--accent-light);border:1px solid rgba(204,27,27,0.3);color:var(--accent);font-family:'Share Tech Mono',monospace;}
.btn-dl{display:inline-flex;align-items:center;gap:5px;background:rgba(74,144,217,0.1);border:1px solid rgba(74,144,217,0.3);color:var(--blue);border-radius:6px;padding:7px 13px;font-size:12px;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif;}
.btn-add{background:var(--accent-light);border:1px solid rgba(204,27,27,0.4);color:var(--accent);border-radius:8px;padding:11px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:600;width:100%;}
.btn-danger{background:rgba(240,64,64,0.08);border:1px solid rgba(240,64,64,0.3);color:var(--red);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;width:100%;margin-top:8px;}
.btn-export{background:rgba(45,189,110,0.1);border:1px solid rgba(45,189,110,0.35);color:var(--green);border-radius:8px;padding:13px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:700;width:100%;}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.img-preview-box{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:10px;display:none;}
.img-preview-box img{width:100%;display:block;}
.img-preview-info{padding:8px 12px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;}
.btn-rm-img{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;}
.data-list{display:flex;flex-direction:column;gap:7px;max-height:360px;overflow-y:auto;}
.data-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.data-item-text{font-size:13px;}
.data-item-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.btn-del{background:rgba(240,64,64,0.1);border:1px solid rgba(240,64,64,0.3);color:var(--red);border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0;}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:14px;font-weight:500;}
.settings-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.btn-edit{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-end;}
.modal-overlay.active{display:flex;}
.modal-overlay.center{align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px 16px calc(20px + env(safe-area-inset-bottom));animation:slideUp 0.3s ease;}
.modal-center{background:var(--surface);border-radius:16px;width:calc(100% - 40px);max-width:360px;padding:24px 20px;animation:fadeIn 0.2s ease;}
.imgmap-modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.modal-model{font-family:'Share Tech Mono',monospace;color:var(--accent);font-size:14px;margin-bottom:18px;}
.spec-table{width:100%;border-collapse:collapse;}
.spec-table tr{border-bottom:1px solid var(--border);}
.spec-table tr:last-child{border-bottom:none;}
.spec-table td{padding:10px 4px;font-size:14px;}
.spec-table td:first-child{color:var(--text2);width:36%;font-size:12px;}
.modal-close{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:13px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:18px;}
.login-title{font-size:18px;font-weight:700;margin-bottom:4px;text-align:center;}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px;}
.login-icon{font-size:32px;text-align:center;margin-bottom:12px;}
.login-field{margin-bottom:12px;}
.login-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;}
.login-input:focus{outline:none;border-color:var(--accent);}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;}
.btn-login:active{background:var(--accent2);}
.login-err{background:rgba(240,64,64,0.1);border:1px solid rgba(240,64,64,0.3);color:var(--red);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;display:none;}
.btn-cancel{width:100%;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text2);padding:12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:8px;}
.app-name-preview{font-size:20px;font-weight:700;text-align:center;padding:14px;background:var(--surface2);border-radius:8px;margin-bottom:10px;}
.imgmap-title{font-size:15px;font-weight:700;margin-bottom:10px;}
.imgmap-tip{font-size:12px;color:var(--text2);background:var(--surface2);padding:10px 12px;border-radius:8px;margin-bottom:12px;line-height:1.5;}
.imgmap-img-wrap{position:relative;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:13px;}
.imgmap-img-wrap img{width:100%;display:block;pointer-events:none;}
.imgmap-dot{position:absolute;width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transform:translate(-50%,-50%);cursor:grab;z-index:5;box-shadow:0 0 0 3px rgba(204,27,27,0.3);}
.hotspot-list{display:flex;flex-direction:column;gap:7px;margin-bottom:11px;}
.hotspot-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:9px;}
.hotspot-item-num{width:22px;height:22px;background:var(--accent-light);border:1px solid rgba(204,27,27,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:3px;}
.hi-inputs{flex:1;display:flex;flex-direction:column;gap:5px;}
.hi-inputs input{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 9px;font-size:12px;font-family:'Noto Sans KR',sans-serif;width:100%;}
.hi-inputs input:focus{outline:none;border-color:var(--accent);}
.btn-del-hs{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:2px;flex-shrink:0;}
.btn-add-hs{background:rgba(45,189,110,0.1);border:1px solid rgba(45,189,110,0.3);color:var(--green);border-radius:8px;padding:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;width:100%;margin-bottom:10px;}
.btn-save-hs{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── LAYOUT EDITOR ── */
.page-editor{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:none;flex-direction:column;}
.page-editor.active{display:flex;}
.editor-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.editor-title{font-size:15px;font-weight:700;flex:1;}
.editor-tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.editor-tab{flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;}
.editor-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.editor-body{flex:1;overflow-y:auto;padding:16px;}
.editor-section{margin-bottom:20px;}
.editor-section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.editor-field-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:grab;user-select:none;transition:border-color 0.2s;}
.editor-field-row.dragging{opacity:0.4;border-color:var(--accent);}
.editor-field-row.drag-over{border-color:var(--accent);background:var(--accent-light);}
.drag-handle{color:var(--text2);font-size:18px;flex-shrink:0;cursor:grab;}
.field-toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.2s;}
.field-toggle.on{background:var(--accent);}
.field-toggle.off{background:var(--border);}
.field-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;transition:left 0.2s;}
.field-toggle.on::after{left:20px;}
.field-toggle.off::after{left:2px;}
.field-label-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
.field-label-input:focus{outline:none;border-color:var(--accent);}
.field-key{font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace;background:var(--surface2);padding:2px 6px;border-radius:4px;flex-shrink:0;}
.editor-preview{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;}
.editor-preview-title{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;margin-bottom:10px;}
.preview-filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.preview-filter-box{background:var(--surface2);border-radius:8px;padding:9px 11px;}
.preview-filter-label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:0.3px;text-transform:uppercase;margin-bottom:4px;}
.preview-filter-val{font-size:13px;color:var(--text);opacity:0.5;}
.preview-filter-box.full{grid-column:1/-1;}
.btn-save-layout{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:6px;}
.btn-reset-layout{width:100%;background:none;border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:11px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:8px;}
.text-edit-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.text-edit-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.text-edit-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 11px;font-size:14px;font-family:'Noto Sans KR',sans-serif;}
.text-edit-input:focus{outline:none;border-color:var(--accent);}
</style>
</head>

const MAKER_URLS = {

  '키엔스코리아' : 'https://www.keyence.co.kr/',
  // 다른 제조사 추가:
  // '제조사 이름': 'https://...',
};
// ── GitHub 동기화 설정 (public repo, read-only fetch) ──
const GH={
  owner:'kct-parts',
  repo:'searching',
  branch:'main',
  path:'data.json',
  versionKey:'eq_v6_version',
  syncedAtKey:'eq_v6_synced_at',
  get rawUrl(){return 'https://raw.githubusercontent.com/'+this.owner+'/'+this.repo+'/'+this.branch+'/'+this.path;}
};
let DB=JSON.parse(localStorage.getItem(K.data)||'[]');
let IMGS=JSON.parse(localStorage.getItem(K.img)||'{}');
let HS=JSON.parse(localStorage.getItem(K.hs)||'{}');
let UI=JSON.parse(localStorage.getItem(K.ui)||'{"title":"부품 검색 시스템","sub":"제작자 : CMP제조기술팀 강해원"}');
let curGroup=null,curEquip=null;
let _lastResults=[],_lastParts=[];

// ── XSS-safe output helpers ──
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

// ── Crypto helpers (SHA-256 + 128-bit salt) ──
// ── Idle-timeout ──
// ──────────────────────────────────────────
// FILE SYSTEM ACCESS API — 이 HTML 파일에 자체 저장
// Chrome/Edge 한정. file:// 에서는 FSA 대신 수동 다운로드 폴백
// ──────────────────────────────────────────
let _fsaHandle=null, _fsaTimer=null;
const FSA_IDB='kc_fsa_db', FSA_STORE='handle', FSA_KEY='current';

async function fsaIdbPut(v){const db=await fsaIdbOpen();return new Promise((res,rej)=>{const tx=db.transaction(FSA_STORE,'readwrite');tx.objectStore(FSA_STORE).put(v,FSA_KEY);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function fsaIdbGet(){const db=await fsaIdbOpen();return new Promise((res,rej)=>{const tx=db.transaction(FSA_STORE,'readonly');const rq=tx.objectStore(FSA_STORE).get(FSA_KEY);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});}
async function fsaIdbDel(){const db=await fsaIdbOpen();return new Promise((res,rej)=>{const tx=db.transaction(FSA_STORE,'readwrite');tx.objectStore(FSA_STORE).delete(FSA_KEY);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}

// 현재 DOM + 데이터 시드를 내장한 HTML 소스를 반환 (FSA · 수동 다운로드 공통 사용)
// file:// 환경 폴백 — 수동 다운로드로 "자체 저장" 흉내
async function saveToSelfFile(){
  if(!_fsaHandle)return;
  if(!(await fsaEnsurePermission(_fsaHandle))){fsaSetStatus('권한 없음 (재연결 필요)');throw new Error('쓰기 권한 거부');}
  const src=buildSelfSavedHtml();
  const w=await _fsaHandle.createWritable();
  await w.write(new Blob([src],{type:'text/html;charset=utf-8'}));
  await w.close();
  fsaSetStatus('저장됨: '+new Date().toLocaleTimeString('ko-KR')+' ('+_fsaHandle.name+')');
}

// 부팅 시 저장된 핸들 복원 시도 + UI 갱신

// ── GitHub 동기화 상태 뱃지 ──
function setSyncBadge(state,text){
  const el=document.getElementById('sync-badge');
  if(!el)return;
  const palette={
    idle:   {bg:'rgba(100,100,100,0.10)',br:'rgba(130,130,130,0.30)',fg:'var(--text2)',dot:'⚪'},
    syncing:{bg:'rgba(74,144,217,0.15)', br:'rgba(74,144,217,0.40)', fg:'var(--blue)', dot:'🔵'},
    ok:     {bg:'rgba(100,200,120,0.14)',br:'rgba(100,200,120,0.40)',fg:'#6ac46a',     dot:'🟢'},
    local:  {bg:'rgba(220,180,80,0.13)', br:'rgba(220,180,80,0.40)', fg:'#e0c060',     dot:'🟡'},
    err:    {bg:'rgba(204,27,27,0.12)',  br:'rgba(204,27,27,0.40)',  fg:'var(--accent)',dot:'🔴'}
  };
  const c=palette[state]||palette.idle;
  el.style.background=c.bg;
  el.style.borderColor=c.br;
  el.style.color=c.fg;
  el.textContent=c.dot+' '+text;
  el.setAttribute('data-state',state);
}

// ── GitHub에서 data.json 가져오기 ──
async function fetchFromGitHub(opts){
  opts=opts||{};
  const silent=!!opts.silent, force=!!opts.force;
  try{
    setSyncBadge('syncing','동기화 중...');
    const url=GH.rawUrl+'?t='+Date.now();
    const res=await fetch(url,{cache:'no-store'});
    if(res.status===404){
      setSyncBadge('local','원격 파일 없음');
      if(!silent)alert('ℹ️ GitHub 저장소에 data.json 파일이 아직 없습니다.\n\n관리 모드 → "📤 data.json 내보내기"로 파일을 만든 뒤 저장소(kct-parts/searching)에 업로드하세요.');
      return {ok:false,reason:'not_found'};
    }
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(!json||typeof json!=='object')throw new Error('JSON 형식 오류');
    const remoteV=+(json.version||0);
    const localV=+(localStorage.getItem(GH.versionKey)||0);
    if(!force && remoteV<=localV && localV>0){
      setSyncBadge('ok','최신 v'+localV);
      return {ok:true,changed:false,version:localV};
    }
    // 적용
    DB=Array.isArray(json.DB)?json.DB:[];
    IMGS=(json.IMGS&&typeof json.IMGS==='object')?json.IMGS:{};
    HS=(json.HS&&typeof json.HS==='object')?json.HS:{};
    if(json.UI&&typeof json.UI==='object')UI=Object.assign(UI,json.UI);
    try{save();}catch(_){}
    localStorage.setItem(GH.versionKey,String(remoteV));
    localStorage.setItem(GH.syncedAtKey,json.updatedAt||new Date().toISOString());
    setSyncBadge('ok','동기화됨 v'+remoteV);
    applyUI();
    try{refreshFilters();}catch(_){}
    try{renderDList();}catch(_){}
    try{refreshEqSel();}catch(_){}
    checkEmptyMsg();
    if(!silent)alert('☁️ GitHub에서 최신 데이터 가져옴\n\n버전: v'+remoteV+'\n품목: '+DB.length+'건\n업데이트: '+(json.updatedAt||'-'));
    return {ok:true,changed:true,version:remoteV};
  }catch(e){
    console.warn('GitHub fetch failed:',e);
    setSyncBadge('err','오프라인');
    if(!silent)alert('❌ GitHub에서 불러오지 못했습니다.\n\n'+(e.message||e)+'\n\n로컬 저장 데이터로 계속 사용합니다.');
    return {ok:false,error:e};
  }
}

// ── FILTER CASCADE HELPERS ──
const FILTER_MAP = {fc:'customer',fu:'unit',fdv:'division',fic:'itemcode',fpt:'parttype',fm:'model',fmk:'maker'};
function sortKo(arr){return arr.slice().sort((a,b)=>String(a).localeCompare(String(b),'ko'));}
function getActiveFilters(){
  const act={};
  Object.keys(FILTER_MAP).forEach(id=>{
    const el=document.getElementById(id);
    if(el && el.value) act[FILTER_MAP[id]] = el.value;
  });
  return act;
}
function getKeyword(){const ft=document.getElementById('ft');return ft?ft.value.trim().toLowerCase():'';}
function filterDBBy(active,kw){
  return DB.filter(d=>{
    if(!Object.keys(active).every(k=>d[k]===active[k])) return false;
    if(kw){
      const t=kw;
      if(!((d.model||'').toLowerCase().includes(t)||(d.part||'').toLowerCase().includes(t)||(d.itemcode||'').toLowerCase().includes(t))) return false;
    }
    return true;
  });
}
function debounce(fn,ms){let t;return function(){clearTimeout(t);const a=arguments,c=this;t=setTimeout(()=>fn.apply(c,a),ms);};}
const debouncedSearch = debounce(()=>{ if(document.getElementById('search-results').style.display==='block') doSearch(); }, 300);
const debouncedCascade = debounce(()=>{ refreshFilters(); debouncedSearch(); }, 250);

function refreshFilters(){
  function setOpts(id,arr){
    const el=document.getElementById(id);if(!el)return;
    const v=el.value;
    el.innerHTML='<option value="">전체</option>';
    arr.forEach(x=>{const o=document.createElement('option');o.value=o.textContent=x;el.appendChild(o);});
    if(!arr.length){const o=document.createElement('option');o.disabled=true;o.textContent='— 결과 없음 —';el.appendChild(o);}
    if(v && arr.includes(v)) el.value=v; else el.value='';
  }
  const active = getActiveFilters();
  const kw = getKeyword();
  Object.keys(FILTER_MAP).forEach(id=>{
    const selfKey = FILTER_MAP[id];
    const other = {};
    Object.keys(active).forEach(k=>{ if(k!==selfKey) other[k]=active[k]; });
    const pool = filterDBBy(other, kw);
    const opts = sortKo([...new Set(pool.map(d=>d[selfKey]).filter(Boolean))]);
    setOpts(id, opts);
  });
}

function attachFilterHandlers(){
  Object.keys(FILTER_MAP).forEach(id=>{
    const el=document.getElementById(id);
    if(!el || el.dataset.bound) return;
    el.addEventListener('change', ()=>{ refreshFilters(); debouncedSearch(); });
    el.dataset.bound = '1';
  });
  const ft=document.getElementById('ft');
  if(ft && !ft.dataset.bound){
    ft.addEventListener('input', debouncedCascade);
    ft.dataset.bound = '1';
  }
}
// (idle rearm removed — public build has no admin session)

function doSearch(){
  const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const c=gv('fc'),g=gv('fg'),n=gv('fn'),u=gv('fu'),dv=gv('fdv'),ic=gv('fic'),pt=gv('fpt'),m=gv('fm'),mk=gv('fmk'),t=(gv('ft')||'').trim().toLowerCase();
  const r=DB.filter(d=>(!c||d.customer===c)&&(!g||d.group===g)&&(!n||d.equip===n)&&(!u||d.unit===u)&&(!dv||d.division===dv)&&(!ic||d.itemcode===ic)&&(!pt||d.parttype===pt)&&(!m||d.model===m)&&(!mk||d.maker===mk)&&(!t||(d.model||'').toLowerCase().includes(t)||(d.part||'').toLowerCase().includes(t)||(d.itemcode||'').toLowerCase().includes(t)));
  _lastResults=r;
  document.getElementById('rc').textContent=r.length;
  document.getElementById('search-results').style.display='block';
  document.getElementById('empty-msg').style.display='none';
  const el=document.getElementById('rl');
  if(!r.length){el.innerHTML='<div class="empty-state"><div class="icon">🔎</div><p>검색 결과가 없습니다</p></div>';return;}
  el.innerHTML=r.map((d,i)=>'<div class="result-card" onclick="showDetailIdx('+i+')">'+
    '<div class="card-parttype">'+esc(d.parttype||'-')+'</div>'+
    '<div class="card-model">'+esc(d.model||'-')+'</div>'+
    '<div class="card-name">'+esc(d.part||'-')+'</div>'+
    (d.specs?'<div class="card-specs"><b>사양:</b>'+esc(d.specs)+'</div>':'')+
    (d.itemcode?'<div class="card-submeta">['+esc(d.itemcode)+']</div>':'')+
    '<div class="card-tags">'+
    (d.division?'<span class="tag hl">'+esc(d.division)+'</span>':'')+
    '<span class="tag">'+esc(d.unit||'')+'</span><span class="tag">'+esc(d.equip||'')+'</span><span class="tag">'+esc(d.customer||'')+'</span>'+(d.maker?'<span class="tag">'+esc(d.maker)+'</span>':'')+
    '</div></div>').join('');
}
function showDetailIdx(i){const d=_lastResults[i];if(d)showDetail(d);}
function clearSearch(){document.getElementById('search-results').style.display='none';['fc','fg','fn','fu','fdv','fic','fpt','fm','fmk'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const ftEl=document.getElementById('ft');if(ftEl)ftEl.value='';refreshFilters();checkEmptyMsg();}

function showDetail(d){
  document.getElementById('mt').textContent=d.part||'-';
  document.getElementById('mm').textContent='모델: '+(d.model||'-');
  // specs: prefer ';' when present (safe for commas in values), fallback to ','
  const rawSpecs=(d.specs||'');const sep=rawSpecs.indexOf(';')>-1?';':',';
  const rows=[['Module',d.customer],['Unit',d.unit],['구분',d.division],['품목코드',d.itemcode],['부품종류',d.parttype],['제조사',d.maker],['사양',rawSpecs],['제조사 홈페이지',MAKER_URLS[d.maker]||''],
    ...rawSpecs.split(sep).map(s=>{const p=s.indexOf(':');return p>-1?[s.slice(0,p).trim(),s.slice(p+1).trim()]:[s.trim(),null];})
  ].filter(r=>r[1]&&String(r[1]).trim());
  const tbl=document.getElementById('ms');tbl.innerHTML='';
rows.forEach(r=>{
  const tr=document.createElement('tr');
  const t1=document.createElement('td');
  const t2=document.createElement('td');
  t1.textContent=r[0];
  if(r[0]==='제조사 홈페이지' && /^https?:\/\//.test(String(r[1]))){
    const a=document.createElement('a');
    a.href=r[1];
    a.textContent='바로가기 ↗';
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.style.color='var(--accent)';
    a.style.textDecoration='underline';
    t2.appendChild(a);
  } else {
    t2.textContent=r[1];
  }
  if(r[0]==='사양') t2.style.whiteSpace='pre-wrap';
  tr.append(t1,t2);
  tbl.appendChild(tr);
});
  document.getElementById('dmodal').classList.add('active');
}

// ── XLSX UPLOAD (SheetJS) ──
function openHSEditor(){
  editEquip=document.getElementById('img-eq-sel').value;
  if(!editEquip||!IMGS[editEquip])return;
  tempHS=JSON.parse(JSON.stringify(HS[editEquip]||[]));

  tempHS.forEach((s,i)=>addDot(w,s.x,s.y,i));renderHSList();document.getElementById('hsmodal').classList.add('active');
}
function makeDrag(dot,idx){
  let drag=false,sx,sy,sl,st;
  function s2(cx,cy){drag=true;sx=cx;sy=cy;sl=parseFloat(dot.style.left);st=parseFloat(dot.style.top);}
  function mv(cx,cy){if(!drag)return;const r=document.getElementById('hs-imgwrap').getBoundingClientRect();dot.style.left=Math.max(0,Math.min(100,sl+(cx-sx)/r.width*100)).toFixed(1)+'%';dot.style.top=Math.max(0,Math.min(100,st+(cy-sy)/r.height*100)).toFixed(1)+'%';tempHS[idx].x=parseFloat(dot.style.left);tempHS[idx].y=parseFloat(dot.style.top);}
  function en(){drag=false;}
  dot.addEventListener('mousedown',function(e){e.stopPropagation();s2(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){mv(e.clientX,e.clientY);});document.addEventListener('mouseup',en);
  dot.addEventListener('touchstart',function(e){e.stopPropagation();e.preventDefault();s2(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  document.addEventListener('touchmove',function(e){mv(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});document.addEventListener('touchend',en);
}

function saveLayoutStore(){ localStorage.setItem(K_LAYOUT, JSON.stringify(LAYOUT)); }

// Migration v6 → v7: ensure new filter entries (division / itemcode / model) exist in saved LAYOUT
(function migrateLayoutV7(){
  if(!LAYOUT || !Array.isArray(LAYOUT.filters)) return;
  let dirty = false;
  const hasKey = k => LAYOUT.filters.some(f=>f.key===k);
  if(!hasKey('division')){
    const idx = LAYOUT.filters.findIndex(f=>f.key==='unit');
    LAYOUT.filters.splice(idx>=0?idx+1:Math.max(LAYOUT.filters.length-1,0), 0,
      {key:'division', label:'구분', visible:true, full:false});
    dirty = true;
  }
  if(!hasKey('itemcode')){
    const idx = LAYOUT.filters.findIndex(f=>f.key==='division');
    LAYOUT.filters.splice(idx>=0?idx+1:Math.max(LAYOUT.filters.length-1,0), 0,
      {key:'itemcode', label:'품목코드', visible:true, full:false});
    dirty = true;
  }
  if(!hasKey('model')){
    const idx = LAYOUT.filters.findIndex(f=>f.key==='parttype');
    LAYOUT.filters.splice(idx>=0?idx+1:Math.max(LAYOUT.filters.length-1,0), 0,
      {key:'model', label:'모델명', visible:true, full:false});
    dirty = true;
  }
  // Relabel legacy keyword "모델명 / 키워드" → "키워드"
  const kw = LAYOUT.filters.find(f=>f.key==='keyword');
  if(kw && kw.label==='모델명 / 키워드'){ kw.label='키워드'; dirty = true; }
  if(dirty) saveLayoutStore();
})();

// Apply layout to live search tab
function applyLayoutToSearch(){
  // Title / sub / btn
  const st = document.querySelector('#screen-search .screen-title');
  const ss = document.querySelector('#screen-search .screen-sub');
  const sb = document.querySelector('#screen-search .btn-search');
  if(st) st.textContent = LAYOUT.searchTitle;
  if(ss) ss.textContent = LAYOUT.searchSub;
  if(sb) sb.textContent = LAYOUT.searchBtn;

  // Rebuild filter grid
  const grid = document.querySelector('#screen-search .filter-grid');
  if(!grid) return;
  grid.innerHTML = '';
  LAYOUT.filters.forEach(f => {
    if(!f.visible) return;
    const box = document.createElement('div');
    box.className = 'filter-box' + (f.full ? ' full' : '');
    if(f.key === 'keyword'){
      box.innerHTML = '<div class="filter-label">'+esc(f.label)+'</div><input class="filter-input" id="ft" placeholder="모델명·부품명·품목코드 검색..."/>';
    } else {
      const idMap = {customer:'fc',unit:'fu',division:'fdv',itemcode:'fic',parttype:'fpt',model:'fm',maker:'fmk'};
      box.innerHTML = '<div class="filter-label">'+esc(f.label)+'</div><div class="sw"><select class="filter-select" id="'+idMap[f.key]+'"><option value="">전체</option></select></div>';
    }
    grid.appendChild(box);
  });
  refreshFilters();
  attachFilterHandlers();
}

// Apply layout to unit tab
function applyLayoutToUnit(){
  const ut = document.querySelector('#screen-unit .screen-title');
  const us = document.querySelector('#screen-unit .screen-sub');
  if(ut) ut.textContent = LAYOUT.unitTitle;
  if(us) us.textContent = LAYOUT.unitSub;
}

function applyAllLayout(){ applyLayoutToSearch(); applyLayoutToUnit(); }
applyAllLayout();
